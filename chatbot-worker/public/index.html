<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Profile Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    #status {
      font-size: 13px;
      color: #888;
      font-style: italic;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #0066cc;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f0f0;
      color: #222;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.loading {
      color: #888;
      font-style: italic;
    }

    form#chat-form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 22px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: #0066cc;
    }

    #message-input:disabled {
      background: #f5f5f5;
      color: #999;
    }

    #send-btn {
      padding: 10px 20px;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 22px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) {
      background: #0052a3;
    }

    #send-btn:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 16px;
      }

      .message {
        max-width: 90%;
        font-size: 14px;
      }

      #send-btn {
        padding: 10px 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Professional Profile Chat</h1>
      <p id="status">Ready</p>
    </header>
    <div id="messages"></div>
    <form id="chat-form">
      <input
        type="text"
        id="message-input"
        placeholder="Ask about skills, experience, projects..."
        autocomplete="off"
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get("token") || "";
    const history = [];

    function appendMessage(role, content) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = content;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage(message) {
      const input = document.getElementById("message-input");
      const btn = document.getElementById("send-btn");
      const statusEl = document.getElementById("status");

      input.disabled = true;
      btn.disabled = true;
      statusEl.textContent = "Thinking...";

      appendMessage("user", message);
      history.push({ role: "user", content: message });

      const assistantEl = appendMessage("assistant", "");
      assistantEl.classList.add("loading");
      assistantEl.textContent = "...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token ? ("Bearer " + token) : "",
          },
          body: JSON.stringify({
            message: message,
            history: history.slice(0, -1),
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: "Request failed" }));
          assistantEl.classList.remove("loading");
          assistantEl.textContent = "Error: " + (err.error || response.statusText);
          history.pop();
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = "";

        assistantEl.classList.remove("loading");
        assistantEl.textContent = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          fullResponse += chunk;
          assistantEl.textContent = fullResponse;
          const messagesEl = document.getElementById("messages");
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        history.push({ role: "assistant", content: fullResponse });
      } catch (error) {
        assistantEl.classList.remove("loading");
        assistantEl.textContent = "Error: " + error.message;
        history.pop();
      } finally {
        input.disabled = false;
        btn.disabled = false;
        input.focus();
        statusEl.textContent = "Ready";
      }
    }

    document.getElementById("chat-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const input = document.getElementById("message-input");
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      sendMessage(message);
    });

    window.addEventListener("load", function() {
      appendMessage(
        "assistant",
        "Hi! I'm a professional profile assistant. Ask me about skills, experience, projects, or work approach. What would you like to know?"
      );
      document.getElementById("message-input").focus();
    });
  </script>
</body>
</html>
